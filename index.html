<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Kaspi QR" />
    <meta name="description" content="Экран успешной оплаты Kaspi QR" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/logo_150.png" type="image/png" />
    <link rel="apple-touch-icon" href="assets/logo_150.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <title>Kaspi QR</title>
    <style>
      :root { font-family: Roboto, Arial, sans-serif; color: #202020; background: #f5f5f5; }
      * { box-sizing: border-box; }
      body { margin: 0; min-width: 320px; min-height: 100vh; background: #f5f5f5; }
      button { font: inherit; }
      .app { width: 100%; max-width: 420px; min-height: 100vh; margin: 0 auto; overflow: hidden; padding-bottom: 14px; }
      .card { background: #fff; border-radius: 0 0 14px 14px; }
      .success { height: 313px; display: flex; flex-direction: column; align-items: center; padding-top: 18px; }
      .brand { margin: 0; font-size: 18px; line-height: 21px; font-weight: 700; }
      .check { width: 64px; height: 64px; margin-top: 46px; }
      .check img { display: block; width: 100%; height: 100%; }
      .thanks { margin: 33px 0 0; font-size: 27px; line-height: 32px; font-weight: 500; letter-spacing: -.3px; }
      .amount { margin: 24px 0 0; font-size: 43px; line-height: 50px; font-weight: 500; letter-spacing: .3px; }
      .purchase { margin-top: 14px; border-radius: 14px; overflow: hidden; }
      .details { display: grid; grid-template-columns: 1fr 1fr; height: 80px; }
      .detail { appearance: none; border: 0; background: transparent; text-align: left; padding: 20px 15px 12px; color: #202020; cursor: pointer; }
      .detail + .detail { border-left: 1px solid #f2f2f2; padding-left: 21px; }
      .detail-label { display: block; color: #858585; font-size: 16px; line-height: 19px; }
      .detail-value { display: block; margin-top: 2px; font-size: 17px; line-height: 20px; }
      .receipt { height: 76px; display: flex; align-items: center; border-top: 1px solid #f2f2f2; padding: 0 15px 0 17px; color: #373737; }
      .receipt-icon { width: 22px; height: 24px; color: #ec5c5c; flex: 0 0 auto; }
      .receipt-text { margin-left: 19px; }
      .receipt-title { margin: 0; font-size: 16px; line-height: 19px; }
      .receipt-note { margin: 3px 0 0; color: #858585; font-size: 13px; line-height: 15px; }
      .arrow { width: 10px; height: 10px; margin-left: auto; border-top: 2px solid #b5b5b5; border-right: 2px solid #b5b5b5; transform: rotate(45deg); }
      .offers { height: 249px; margin-top: 10px; border-radius: 14px 14px 0 0; padding: 23px 0 0; overflow: hidden; }
      .offers h2 { margin: 0 0 17px 16px; font-size: 18px; line-height: 21px; font-weight: 700; }
      .offer-grid { display: grid; grid-template-columns: 207px 164px; gap: 25px; }
      .offer { height: 189px; overflow: hidden; background: #ececec; }
      .offer:first-child { border-radius: 10px 10px 0 0; }
      .offer img { display: block; width: 100%; height: 100%; object-fit: cover; }
      .offer-missing { height: 100%; display: grid; place-items: center; text-align: center; color: #777; font-size: 13px; line-height: 18px; padding: 16px; background: linear-gradient(145deg,#d6ecf6,#e8e6dc); }
      .home { display: block; width: calc(100% - 30px); height: 56px; margin: 17px 15px 0; border: 0; border-radius: 11px; background: #1d83c6; color: #fff; font-size: 17px; line-height: 56px; text-align: center; text-decoration: none; box-shadow: inset 0 -1px 0 rgba(0,0,0,.12); }
      .modal-backdrop { position: fixed; inset: 0; z-index: 10; display: none; align-items: center; justify-content: center; padding: 22px; background: rgba(0,0,0,.36); }
      .modal-backdrop.visible { display: flex; }
      .modal { width: min(100%, 330px); padding: 21px 20px 17px; border-radius: 14px; background: #fff; box-shadow: 0 10px 32px rgba(0,0,0,.2); }
      .modal h3 { margin: 0; font-size: 19px; line-height: 23px; }
      .modal input { width: 100%; height: 44px; margin-top: 17px; padding: 0 10px; border: 1px solid #d7d7d7; border-radius: 7px; outline: none; font: 16px Roboto, Arial, sans-serif; }
      .modal input:focus { border-color: #1d83c6; box-shadow: 0 0 0 2px rgba(29,131,198,.13); }
      .modal-actions { display: flex; justify-content: flex-end; gap: 20px; margin-top: 19px; }
      .modal-actions button { border: 0; background: none; padding: 5px 0; color: #1d83c6; font-size: 15px; font-weight: 500; cursor: pointer; }
      @media (max-width: 390px) { .offer-grid { grid-template-columns: calc((100vw - 25px) * .557) calc((100vw - 25px) * .443); } .offer { height: calc((100vw - 25px) * .508); } .offers { height: calc((100vw - 25px) * .508 + 60px); } }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="success card" aria-label="Оплата успешно выполнена">
        <p class="brand">Kaspi QR</p>
        <div class="check" aria-hidden="true"><img src="assets/галочка.svg" alt=""></div>
        <h1 class="thanks">Спасибо за покупку</h1>
        <p class="amount">100 ₸</p>
      </section>
      <section class="purchase card" aria-label="Данные покупки">
        <div class="details">
          <button class="detail" type="button" data-field="seller"><span class="detail-label">Продавец</span><span class="detail-value" id="seller-value">ИП Бигул</span></button>
          <button class="detail" type="button" data-field="date"><span class="detail-label">Дата покупки</span><span class="detail-value" id="date-value">18 июля, 01:50</span></button>
        </div>
        <div class="receipt"><svg class="receipt-icon" viewBox="0 0 24 25" fill="none" aria-hidden="true"><path d="M6 2.8h8.6L19 7.2v13a1.8 1.8 0 0 1-1.8 1.8H6a1.8 1.8 0 0 1-1.8-1.8V4.6A1.8 1.8 0 0 1 6 2.8Z" stroke="currentColor" stroke-width="1.9"/><path d="M14.5 2.8v4.6H19M8 12h7M8 16h5" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></svg><div class="receipt-text"><p class="receipt-title">Показать чек об оплате</p><p class="receipt-note">Чек сохранен в сообщениях</p></div><span class="arrow" aria-hidden="true"></span></div>
      </section>
      <section class="offers card"><h2>Все предложения</h2><div class="offer-grid"><div class="offer"><img src="assets/calf-promo.jpg" alt="Мягкая игрушка Бегающий теленок" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'offer-missing',textContent:'Добавьте фото\nassets/calf-promo.jpg'}))"></div><div class="offer"><img src="assets/calf.jpg" alt="Мягкая игрушка теленок" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'offer-missing',textContent:'Добавьте фото\nassets/calf.jpg'}))"></div></div></section>
      <a class="home" href="#" aria-label="Вернуться на Главную Kaspi.kz">Вернуться на Главную Kaspi.kz</a>
    </main>
    <div class="modal-backdrop" id="modal-backdrop" aria-hidden="true"><form class="modal" id="edit-form" aria-modal="true" role="dialog"><h3 id="modal-title">Изменить</h3><input id="edit-input" autocomplete="off" required><div class="modal-actions"><button type="button" id="cancel">Отмена</button><button type="submit">Сохранить</button></div></form></div>
    <script>
      const modal = document.querySelector('#modal-backdrop'); const form = document.querySelector('#edit-form'); const input = document.querySelector('#edit-input'); let activeField;
      document.querySelectorAll('[data-field]').forEach(button => button.addEventListener('click', () => { activeField = button.dataset.field; const isSeller = activeField === 'seller'; document.querySelector('#modal-title').textContent = isSeller ? 'Изменить продавца' : 'Изменить дату покупки'; input.value = document.querySelector(`#${activeField}-value`).textContent; input.placeholder = isSeller ? 'Название продавца' : 'Например, 18 июля, 01:50'; modal.classList.add('visible'); modal.setAttribute('aria-hidden', 'false'); input.focus(); input.select(); }));
      function closeModal() { modal.classList.remove('visible'); modal.setAttribute('aria-hidden', 'true'); }
      document.querySelector('#cancel').addEventListener('click', closeModal); modal.addEventListener('click', e => { if (e.target === modal) closeModal(); }); document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
      form.addEventListener('submit', e => { e.preventDefault(); const value = input.value.trim(); if (value) { document.querySelector(`#${activeField}-value`).textContent = value; localStorage.setItem(`kaspi-${activeField}`, value); } closeModal(); });
      ['seller','date'].forEach(field => { const saved = localStorage.getItem(`kaspi-${field}`); if (saved) document.querySelector(`#${field}-value`).textContent = saved; });
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' });
    </script>
  </body>
</html>
