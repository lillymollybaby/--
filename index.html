<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Kaspi QR" />
    <meta name="description" content="Экран успешной оплаты Kaspi QR" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/logo_150.png" type="image/png" />
    <link rel="apple-touch-icon" href="assets/logo_150.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Kaspi QR</title>
    <style>
      :root { font-family: Roboto, Arial, sans-serif; color: #202020; background: #f5f5f5; }
      * { box-sizing: border-box; }
      body { margin: 0; min-width: 320px; min-height: 100vh; background: #f5f5f5; }
      button { font: inherit; }
      .app { width: 100%; min-height: 100vh; margin: 0 auto; overflow: hidden; padding-bottom: 14px; }
      .card { background: #fff; border-radius: 0 0 14px 14px; }
      .success { height: 313px; display: flex; flex-direction: column; align-items: center; padding-top: 18px; }
      .brand { appearance: none; margin: 0; padding: 0; border: 0; background: transparent; color: inherit; font: inherit; font-size: 18px; line-height: 21px; font-weight: 700; cursor: pointer; }
      .check { width: 64px; height: 64px; margin-top: 46px; }
      .check img { display: block; width: 100%; height: 100%; }
      .thanks { margin: 33px 0 0; font-size: 27px; line-height: 32px; font-weight: 600; letter-spacing: -.3px; }
      .amount { margin: 24px 0 0; font-size: 43px; line-height: 50px; font-weight: 600; letter-spacing: -.6px; }
      .purchase { margin-top: 14px; border-radius: 14px; overflow: hidden; }
      .details { display: grid; grid-template-columns: 1fr 1fr; height: 80px; }
      .detail { appearance: none; border: 0; background: transparent; text-align: left; padding: 20px 15px 12px; color: #202020; cursor: pointer; }
      .detail + .detail { border-left: 1px solid #f2f2f2; padding-left: 21px; }
      .detail-label { display: block; color: #858585; font-size: 16px; line-height: 19px; }
      .detail-value { display: block; margin-top: 2px; font-size: 17px; line-height: 20px; }
      .receipt { width: 100%; height: 76px; display: flex; align-items: center; border: 0; border-top: 1px solid #f2f2f2; padding: 0 15px 0 17px; background: #fff; color: #373737; text-align: left; cursor: pointer; }
      .receipt-icon { width: 22px; height: 24px; color: #ec5c5c; flex: 0 0 auto; }
      .receipt-text { margin-left: 19px; }
      .receipt-title { margin: 0; font-size: 16px; line-height: 19px; }
      .receipt-note { margin: 3px 0 0; color: #858585; font-size: 13px; line-height: 15px; }
      .arrow { width: 10px; height: 10px; margin-left: auto; border-top: 2px solid #b5b5b5; border-right: 2px solid #b5b5b5; transform: rotate(45deg); }
      .offers { height: 249px; margin-top: 10px; border-radius: 14px 14px 0 0; padding: 23px 0 0; overflow: hidden; }
      .offers h2 { margin: 0 0 17px 16px; font-size: 18px; line-height: 21px; font-weight: 700; }
      .offer-grid { display: grid; grid-template-columns: 207px 164px; gap: 25px; }
      .offer { height: 189px; overflow: hidden; background: #ececec; }
      .offer:first-child { border-radius: 10px 10px 0 0; }
      .offer img { display: block; width: 100%; height: 100%; object-fit: cover; }
      .offer:first-child img { object-fit: contain; background: #fff; }
      .offer-missing { height: 100%; display: grid; place-items: center; text-align: center; color: #777; font-size: 13px; line-height: 18px; padding: 16px; background: linear-gradient(145deg,#d6ecf6,#e8e6dc); }
      .bottom-bar { position: fixed; z-index: 4; right: 0; bottom: 0; left: 0; height: 87px; background: #fff; }
      .home { display: block; width: calc(100% - 30px); height: 56px; margin: 17px 15px 0; border: 0; border-radius: 11px; background: #1d83c6; color: #fff; font-size: 17px; line-height: 56px; text-align: center; text-decoration: none; box-shadow: inset 0 -1px 0 rgba(0,0,0,.12); }
      .modal-backdrop { position: fixed; inset: 0; z-index: 30; display: none; align-items: center; justify-content: center; padding: 22px; background: rgba(0,0,0,.36); }
      .modal-backdrop.visible { display: flex; }
      .modal { width: min(100%, 330px); padding: 21px 20px 17px; border-radius: 14px; background: #fff; box-shadow: 0 10px 32px rgba(0,0,0,.2); }
      .modal h3 { margin: 0; font-size: 19px; line-height: 23px; }
      .modal input { width: 100%; height: 44px; margin-top: 17px; padding: 0 10px; border: 1px solid #d7d7d7; border-radius: 7px; outline: none; font: 16px Roboto, Arial, sans-serif; }
      .modal input:focus { border-color: #1d83c6; box-shadow: 0 0 0 2px rgba(29,131,198,.13); }
      .modal-actions { display: flex; justify-content: flex-end; gap: 20px; margin-top: 19px; }
      .modal-actions button { border: 0; background: none; padding: 5px 0; color: #1d83c6; font-size: 15px; font-weight: 500; cursor: pointer; }
      .receipt-screen { position: fixed; z-index: 20; inset: 0; display: none; overflow-y: auto; background: #f8f8f8; padding: 116px 31px 68px; }
      .receipt-screen.visible { display: block; }
      .receipt-sheet { position: relative; width: 100%; min-height: 925px; overflow: hidden; background: #fff; box-shadow: 0 0 22px rgba(0,0,0,.03); }
      .receipt-sheet::before, .receipt-sheet::after { position: absolute; z-index: 2; right: 0; left: 0; height: 16px; content: ''; background: radial-gradient(circle at 9px 0, #f8f8f8 0 7.5px, transparent 7.9px) 0 0 / 18px 16px repeat-x; pointer-events: none; }
      .receipt-sheet::before { top: 0; }
      .receipt-sheet::after { bottom: 0; background: radial-gradient(circle at 9px 16px, #f8f8f8 0 7.5px, transparent 7.9px) 0 0 / 18px 16px repeat-x; }
      .receipt-logo { height: 171px; padding: 53px 30px 0; }
      .receipt-logo-mark { width: 77px; height: 77px; overflow: hidden; background: #fff; }
      .receipt-logo-mark img { display: block; width: 100%; height: 100%; transform: scale(1.3); }
      .receipt-status { height: 144px; padding: 25px 30px; background: #d5f2dc; color: #287a42; }
      .receipt-status-title { margin: 0; font-size: 25px; line-height: 31px; font-weight: 700; }
      .receipt-status-amount { margin: 4px 0 0; font-size: 51px; line-height: 59px; font-weight: 700; letter-spacing: 1px; }
      .receipt-info { padding: 42px 30px 36px; }
      .receipt-seller { display: flex; align-items: center; min-height: 65px; margin-bottom: 32px; font-size: 25px; line-height: 30px; }
      .receipt-seller-mark { width: 59px; height: 59px; flex: 0 0 auto; margin-right: 19px; display: grid; place-items: center; border-radius: 50%; background: #4fa507; color: #fff; font-size: 29px; }
      .receipt-row { display: grid; grid-template-columns: 1fr auto; column-gap: 15px; min-height: 59px; align-items: center; border-bottom: 1px solid #eee; font-size: 20px; line-height: 25px; }
      .receipt-edit-value { appearance: none; padding: 8px 0 8px 12px; border: 0; background: transparent; color: inherit; font: inherit; text-align: right; cursor: pointer; }
      .receipt-row .label { color: #858585; }
      .receipt-row .value { text-align: right; }
      .receipt-note-bottom { margin: 74px 0 0; color: #8a8a8a; font-size: 17px; line-height: 21px; text-align: center; }
      .receipt-close, .receipt-share { position: fixed; top: 17px; z-index: 21; width: 42px; height: 42px; padding: 0; border: 0; background: transparent; color: #303030; cursor: pointer; }
      .receipt-close { left: 27px; }
      .receipt-close::before, .receipt-close::after { position: absolute; top: 19px; left: 2px; width: 38px; height: 3.5px; border-radius: 2px; background: currentColor; content: ''; transform: rotate(45deg); }
      .receipt-close::after { transform: rotate(-45deg); }
      .receipt-share { right: 27px; }
      .receipt-share svg { display: block; width: 36px; height: 36px; margin: auto; }
      @media (max-width: 594px) {
        .receipt-screen { padding: 19.5vw 5.21vw 11.43vw; }
        .receipt-sheet { min-height: 155.46vw; }
        .receipt-sheet::before, .receipt-sheet::after { height: 2.69vw; background-size: 3.03vw 2.69vw; }
        .receipt-logo { height: 28.74vw; padding: 8.91vw 5.04vw 0; }
        .receipt-logo-mark { width: 12.94vw; height: 12.94vw; }
        .receipt-status { height: 24.2vw; padding: 4.2vw 5.04vw; }
        .receipt-status-title { font-size: 4.2vw; line-height: 5.21vw; }
        .receipt-status-amount { margin-top: .67vw; font-size: 8.57vw; line-height: 9.92vw; letter-spacing: .17vw; }
        .receipt-info { padding: 7.06vw 5.04vw 6.05vw; }
        .receipt-seller { min-height: 10.92vw; margin-bottom: 5.38vw; font-size: 4.2vw; line-height: 5.04vw; }
        .receipt-seller-mark { width: 9.92vw; height: 9.92vw; margin-right: 3.19vw; font-size: 4.87vw; }
        .receipt-row { min-height: 9.92vw; column-gap: 2.52vw; font-size: 3.36vw; line-height: 4.2vw; }
        .receipt-note-bottom { margin-top: 12.44vw; font-size: 2.86vw; line-height: 3.53vw; }
        .receipt-close, .receipt-share { top: 2.86vw; width: 7.06vw; height: 7.06vw; }
        .receipt-close { left: 4.54vw; }
        .receipt-close::before, .receipt-close::after { top: 3.19vw; left: .34vw; width: 6.39vw; height: .59vw; }
        .receipt-share { right: 4.54vw; }
        .receipt-share svg { width: 6.05vw; height: 6.05vw; }
      }
      @media (max-width: 390px) { .offer-grid { grid-template-columns: calc((100vw - 25px) * .557) calc((100vw - 25px) * .443); } .offer { height: calc((100vw - 25px) * .508); } .offers { height: calc((100vw - 25px) * .508 + 60px); } }
      @media (min-width: 421px) {
        .app { padding-bottom: 2.35vw; }
        .card { border-radius: 0 0 2.35vw 2.35vw; }
        .success { height: 75.46vw; padding-top: 6.22vw; }
        .brand { font-size: 4.03vw; line-height: 4.7vw; }
        .check { width: 15.13vw; height: 15.13vw; margin-top: 10.1vw; }
        .thanks { margin-top: 9.07vw; font-size: 6.05vw; line-height: 7vw; letter-spacing: -.05vw; }
        .amount { margin-top: 5.54vw; font-size: 10.08vw; line-height: 11.8vw; letter-spacing: -.1vw; }
        .purchase { margin-top: 3.19vw; border-radius: 2.35vw; }
        .details { height: 18.99vw; }
        .detail { padding: 4.7vw 2.52vw 2vw; }
        .detail + .detail { padding-left: 3.53vw; }
        .detail-label { font-size: 3.81vw; line-height: 4.54vw; }
        .detail-value { margin-top: .34vw; font-size: 4.03vw; line-height: 4.7vw; }
        .receipt { height: 18.15vw; padding: 0 2.52vw 0 2.86vw; }
        .receipt-icon { width: 3.7vw; height: 4.03vw; }
        .receipt-text { margin-left: 3.19vw; }
        .receipt-title { font-size: 4.03vw; line-height: 4.7vw; }
        .receipt-note { margin-top: .5vw; font-size: 3.03vw; line-height: 3.53vw; }
        .arrow { width: 1.68vw; height: 1.68vw; border-width: .34vw; }
        .offers { height: 59.66vw; margin-top: 2.02vw; border-radius: 2.35vw 2.35vw 0 0; padding-top: 6.22vw; }
        .offers h2 { margin: 0 0 2.86vw 4.54vw; font-size: 4.03vw; line-height: 4.7vw; }
        .offer-grid { grid-template-columns: 50vw 50vw; gap: 0; }
        .offer { height: 44.54vw; }
        .offer:first-child { border-radius: 0; }
        .bottom-bar { height: 20.67vw; }
        .home { width: calc(100% - 8.06vw); height: 13.28vw; margin: 4.03vw 4.03vw 0; border-radius: 1.85vw; font-size: 4.03vw; line-height: 13.28vw; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="success card" aria-label="Оплата успешно выполнена">
        <button class="brand" type="button" data-field="amount" aria-label="Изменить сумму">Kaspi QR</button>
        <div class="check" aria-hidden="true"><img src="assets/галочка.svg" alt=""></div>
        <h1 class="thanks">Спасибо за покупку</h1>
        <p class="amount" id="amount-value">100 ₸</p>
      </section>
      <section class="purchase card" aria-label="Данные покупки">
        <div class="details">
          <button class="detail" type="button" data-field="seller"><span class="detail-label">Продавец</span><span class="detail-value" id="seller-value">ИП Бигул</span></button>
          <button class="detail" type="button" data-field="date"><span class="detail-label">Дата покупки</span><span class="detail-value" id="date-value">18 июля, 01:50</span></button>
        </div>
        <button class="receipt" id="show-receipt" type="button"><svg class="receipt-icon" viewBox="0 0 24 25" fill="none" aria-hidden="true"><path d="M6 2.8h8.6L19 7.2v13a1.8 1.8 0 0 1-1.8 1.8H6a1.8 1.8 0 0 1-1.8-1.8V4.6A1.8 1.8 0 0 1 6 2.8Z" stroke="currentColor" stroke-width="1.9"/><path d="M14.5 2.8v4.6H19M8 12h7M8 16h5" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></svg><div class="receipt-text"><p class="receipt-title">Показать чек об оплате</p><p class="receipt-note">Чек сохранен в сообщениях</p></div><span class="arrow" aria-hidden="true"></span></button>
      </section>
      <section class="offers card"><h2>Все предложения</h2><div class="offer-grid"><div class="offer"><img src="assets/calf-promo.jpg" alt="Мягкая игрушка Бегающий теленок" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'offer-missing',textContent:'Добавьте фото\nassets/calf-promo.jpg'}))"></div><div class="offer"><img src="assets/calf.jpg" alt="Мягкая игрушка теленок" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'offer-missing',textContent:'Добавьте фото\nassets/calf.jpg'}))"></div></div></section>
    </main>
    <div class="bottom-bar"><a class="home" href="#" aria-label="Вернуться на Главную Kaspi.kz">Вернуться на Главную Kaspi.kz</a></div>
    <div class="modal-backdrop" id="modal-backdrop" aria-hidden="true"><form class="modal" id="edit-form" aria-modal="true" role="dialog"><h3 id="modal-title">Изменить</h3><input id="edit-input" autocomplete="off" required><div class="modal-actions"><button type="button" id="cancel">Отмена</button><button type="submit">Сохранить</button></div></form></div>
    <section class="receipt-screen" id="receipt-screen" aria-label="Чек об оплате"><button class="receipt-close" id="close-receipt" type="button" aria-label="Закрыть чек"></button><button class="receipt-share" id="share-receipt" type="button" aria-label="Поделиться чеком"><svg viewBox="0 0 32 32" fill="none" aria-hidden="true"><circle cx="23.5" cy="7" r="3.5" stroke="currentColor" stroke-width="2.8"/><circle cx="8.5" cy="16" r="3.5" stroke="currentColor" stroke-width="2.8"/><circle cx="23.5" cy="25" r="3.5" stroke="currentColor" stroke-width="2.8"/><path d="m11.7 14.3 8.5-5M11.7 17.7l8.5 5" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/></svg></button><article class="receipt-sheet"><header class="receipt-logo"><div class="receipt-logo-mark"><img src="assets/logo_300.png" alt="Kaspi"></div></header><section class="receipt-status"><p class="receipt-status-title">Оплата совершена</p><p class="receipt-status-amount" id="receipt-amount">100 ₸</p></section><section class="receipt-info"><div class="receipt-seller"><span class="receipt-seller-mark">И</span><span id="receipt-seller">ИП Бигул</span></div><div class="receipt-row"><span class="label">№ чека</span><span class="value">QR16566227395</span></div><div class="receipt-row"><span class="label">ИИН/БИН продавца</span><button class="receipt-edit-value" type="button" data-field="bin" id="receipt-bin">911120001480</button></div><div class="receipt-row"><span class="label">ФИО покупателя</span><span class="value">Dastan A.</span></div><div class="receipt-row"><span class="label">Дата и время<br>по Астане</span><span class="value" id="receipt-date">18.07.2026 01:50</span></div><div class="receipt-row"><span class="label">Оплачено</span><span class="value">с Kaspi Gold</span></div><div class="receipt-row"><span class="label">Адрес</span><button class="receipt-edit-value" type="button" data-field="address" id="receipt-address">г. Узынагаш, Жамбыл, 16</button></div><p class="receipt-note-bottom">Чек не является фискальным</p></section></article></section>
    <script>
      const modal = document.querySelector('#modal-backdrop'); const form = document.querySelector('#edit-form'); const input = document.querySelector('#edit-input'); let activeField;
      const formatAmount = value => `${Number(String(value).replace(/[^\d]/g, '') || 0).toLocaleString('ru-RU')} ₸`;
      const receiptDate = value => { const months = { 'января':'01', 'февраля':'02', 'марта':'03', 'апреля':'04', 'мая':'05', 'июня':'06', 'июля':'07', 'августа':'08', 'сентября':'09', 'октября':'10', 'ноября':'11', 'декабря':'12' }; const match = String(value).toLowerCase().match(/(\d{1,2})\s+([а-я]+),?\s*(\d{1,2}:\d{2})/); return match && months[match[2]] ? `${match[1].padStart(2, '0')}.${months[match[2]]}.${new Date().getFullYear()} ${match[3]}` : value; };
      const fieldValue = field => document.querySelector(`#${field}-value`) || document.querySelector(`#receipt-${field}`);
      document.querySelectorAll('[data-field]').forEach(button => button.addEventListener('click', () => { activeField = button.dataset.field; const labels = { seller: 'Изменить продавца', date: 'Изменить дату покупки', amount: 'Изменить сумму', bin: 'Изменить ИИН/БИН', address: 'Изменить адрес' }; document.querySelector('#modal-title').textContent = labels[activeField]; input.value = activeField === 'amount' ? document.querySelector('#amount-value').textContent.replace(/[^\d]/g, '') : fieldValue(activeField).textContent; input.placeholder = activeField === 'seller' ? 'Название продавца' : activeField === 'date' ? 'Например, 18 июля, 01:50' : activeField === 'amount' ? 'Например, 2545' : activeField === 'bin' ? 'ИИН или БИН' : 'Адрес'; input.inputMode = activeField === 'amount' || activeField === 'bin' ? 'numeric' : 'text'; modal.classList.add('visible'); modal.setAttribute('aria-hidden', 'false'); input.focus(); input.select(); }));
      function closeModal() { modal.classList.remove('visible'); modal.setAttribute('aria-hidden', 'true'); }
      document.querySelector('#cancel').addEventListener('click', closeModal); modal.addEventListener('click', e => { if (e.target === modal) closeModal(); }); document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
      form.addEventListener('submit', e => { e.preventDefault(); const value = input.value.trim(); if (value) { const savedValue = activeField === 'amount' ? formatAmount(value) : value; fieldValue(activeField).textContent = savedValue; localStorage.setItem(`kaspi-${activeField}`, savedValue); } closeModal(); });
      ['seller','date','amount','bin','address'].forEach(field => { const saved = localStorage.getItem(`kaspi-${field}`); if (saved) fieldValue(field).textContent = saved; });
      const receiptScreen = document.querySelector('#receipt-screen');
      document.querySelector('#show-receipt').addEventListener('click', () => { document.querySelector('#receipt-amount').textContent = document.querySelector('#amount-value').textContent; document.querySelector('#receipt-seller').textContent = document.querySelector('#seller-value').textContent; document.querySelector('#receipt-date').textContent = receiptDate(document.querySelector('#date-value').textContent); receiptScreen.classList.add('visible'); });
      document.querySelector('#close-receipt').addEventListener('click', () => receiptScreen.classList.remove('visible'));
      document.querySelector('#share-receipt').addEventListener('click', async () => { const data = { title: 'Чек об оплате', text: `${document.querySelector('#receipt-amount').textContent} · ${document.querySelector('#receipt-seller').textContent}` }; if (navigator.share) await navigator.share(data); else if (navigator.clipboard) await navigator.clipboard.writeText(`${data.title}: ${data.text}`); });
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' });
    </script>
  </body>
</html>
